server {
    listen 5000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the hashed, immutable build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: serve index.html for any unmatched route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
